name: Lint

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  eslint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run ESLint
        run: npx --yes eslint@8 kiosk-autoscroll.js
